services:

  egov-postgresql:
    image: postgres:latest
    environment:
      POSTGRES_PASSWORD: secret
      POSTGRES_USER: egov
      POSTGRES_DB: egov-db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql

  egov-sqlserver:
    image: mcr.microsoft.com/mssql/server:2019-latest
    environment:
      ACCEPT_EULA: "Y"
      SA_PASSWORD: sqlserver-secret
      MSSQL_PID: 'Express'
    ports:
      - "1433:1433"

volumes:
  postgres_data: { }