server:
  port: 8095

spring:
  datasource:
    url: jdbc:h2:mem:testdb;MODE=MSSQLServer
    username: sa
    password: password
  jpa:
    database-platform: org.hibernate.dialect.H2Dialect
    hibernate:
      ddl-auto: create-drop
  flyway:
    enabled: false

egov:
  persistence:
    database:
      type: POSTGRESQL
      naming:
        style: SNAKE_CASE
