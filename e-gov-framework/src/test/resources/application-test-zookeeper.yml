spring:
  datasource:
    url: jdbc:tc:postgresql:17.4:///integration-tests-db
    driver-class-name: org.testcontainers.jdbc.ContainerDatabaseDriver
  jpa:
    hibernate:
      ddl-auto: create-drop
  flyway:
    enabled: false

egov:
  persistence:
    database:
      type: POSTGRESQL
      naming:
        style: SNAKE_CASE
  service:
    discovery:
      activated: true
